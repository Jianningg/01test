{% extends "base.html" %}
{% block content %}
    <h1>FAQ</h1>
    {% for item in faq_data %}
        <h3>{{ item.category }}</h3>
        <ul>
        {% for q in item.questions %}
            <li>{{ q }}</li>
        {% empty %}
            <li>Questions will be added soon. (Currently empty)</li>
        {% endfor %}
        </ul>
    {% endfor %}
{% endblock %}
